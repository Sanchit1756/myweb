apiVersion: apps/v1
kind: Deployment
metadata:
  name: myweb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myweb
  template:
    metadata:
      labels:
        app: myweb
    spec:
      containers:
      - name: myweb
        image: 398069592896.dkr.ecr.us-east-2.amazonaws.com/demo/myweb:latest
        ports:
        - containerPort: 8080
